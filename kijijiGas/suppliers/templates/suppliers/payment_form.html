{% extends 'main.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2>Trigger Customer Payment (STK Push)</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Customer Phone Number</label>
        <input type="text" name="phone_number" class="form-control" placeholder="2547XXXXXXXX" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (KES)</label>
        <input type="number" name="amount" class="form-control" placeholder="Amount to collect" required>
      </div>
   
      <button type="submit" class="btn btn-success">Send STK Push</button>
      <a href="{% url 'supplier_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>

    {% if message %}
      <div class="alert alert-info mt-3">{{ message }}</div>
    {% endif %}
  </div>
</body>
</html>
{%endblock%}
