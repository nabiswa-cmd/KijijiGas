{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kijiji Gas System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
      :root {
        --primary: #0D47A1;   /* Blue */
        --accent: #FBC02D;    /* Yellow */
        --bg-light: #F5F5F5;
        --text-main: #0f172a;
        --text-muted: #64748b;
      }

      body {
        background: var(--bg-light);
        font-family: "Inter", sans-serif;
      }

      /* NAVBAR */
      .navbar {
        background: var(--primary);
        padding-block: 0.8rem;
      }
      .navbar-brand {
        font-size: 1.6rem;
        font-weight: 700;
        color: #fff;
      }
      .nav-link {
        font-weight: 500;
        color: #e3e9ff;
      }
      .nav-link:hover {
        color: var(--accent);
      }

      /* COMMON BUTTONS */
      .btn-accent {
        background: var(--accent);
        color: black;
        font-weight: 600;
      }
      .btn-accent:hover {
        background: #ffd54f;
      }

      .btn-primary {
        background: var(--primary) !important;
        border: none;
      }
      .btn-primary:hover {
        background: #08306d !important;
      }

      /* OPTIONAL HERO (keeps life & animation but simple) */
      .hero {
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        padding: 3rem 1rem;
        border-radius: 15px;
        color: #fff;
        animation: fadeIn 1s ease-out;
        margin-bottom: 2rem;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
  </style>

</head>

<body>

    {% include 'nav.html' %}

    <div class="container py-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
